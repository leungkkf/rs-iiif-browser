name: Rust

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Install Linux dependencies
      uses: ./.github/actions/install-linux-deps       
      with:
        wayland: true
        xkb: true
        x264: true
    - name: Build
      run: cargo build --verbose
    - name: Run tests
      run: cargo test --verbose
