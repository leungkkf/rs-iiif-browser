[package]
name = "rsmicroscopy"
version = "0.1.0"
edition = "2024"

# Enable a small amount of optimization in the dev profile.
[profile.dev]
opt-level = 1

# Enable a large amount of optimization in the dev profile for dependencies.
[profile.dev.package."*"]
opt-level = 3

[dependencies]
bevy = { version="0.17.2", features = [ "dynamic_linking", "http", "https", "jpeg", "wayland"] }
bevy_egui = { path="/home/kelvin/code/bevy_egui" }
chrono = { version = "0.4.42", features = ["serde"] }
clap = { version = "4.5.53", features = ["derive"] }
egui-notify = { path="/home/kelvin/code/egui-notify" }
egui_extras = { git = "https://github.com/leungkkf/egui.git", branch="fix-media-type-optional-parameters", features = ["all_loaders"] }
image = "0.25.8"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.145"
thiserror = "2.0.17"
ureq = "3.1.2"
