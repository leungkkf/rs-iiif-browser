[package]
name = "rsmicroscopy"
version = "0.1.0"
edition = "2024"

# Enable a small amount of optimization in the dev profile.
[profile.dev]
opt-level = 1

# Enable a large amount of optimization in the dev profile for dependencies.
[profile.dev.package."*"]
opt-level = 3

[dependencies]
bevy = { version="0.17.2", features = [ "dynamic_linking", "http", "https", "jpeg", "wayland"] }
bevy_egui = "0.38.0"
chrono = { version = "0.4.42", features = ["serde"] }
egui_extras = { version = "0.33.0", features = ["all_loaders"] }
image = "0.25.8"
iref = "3.2.2"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.145"
sophia = { version = "0.9.0", features = ["http_client", "jsonld"] }
static-iref = "3.0.0"
thiserror = "2.0.17"
tokio = { version = "1.48.0", features = ["full"] }
ureq = "3.1.2"
